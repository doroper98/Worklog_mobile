<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workwiki Mobile — 3 테마</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/CalendarData.jsx"></script>
<script type="text/babel" src="components/HomeView.jsx"></script>
<script type="text/babel" src="components/SlateDetail.jsx"></script>
<script type="text/babel" src="components/WW26Theme.jsx"></script>
<script type="text/babel" src="components/HomeView26.jsx"></script>
<script type="text/babel" src="components/CalendarView26.jsx"></script>
<script type="text/babel" src="components/SlateDetail26.jsx"></script>

<script type="text/babel">
function DeviceShell({ dark, children }) {
  return (
    <IOSDevice width={390} height={844} dark={dark}>
      <div style={{ height: '100%', width: '100%' }}>{children}</div>
    </IOSDevice>
  );
}

function HomeFrame({ label, sublabel, theme, mode, offline, selectedDate, showSheet, sheetSlateIdx, forceTab, hasSlate, forceMD, showFollowUp }) {
  const c = ww26Resolve(theme);
  const dateSlates = wwSlatesFor(selectedDate || WW_TODAY);
  const slateForSheet = showSheet && dateSlates[sheetSlateIdx ?? 0]
    ? { ...dateSlates[sheetSlateIdx ?? 0], idx: sheetSlateIdx ?? 0, forceTab, hasSlate, md: forceMD !== undefined ? forceMD : dateSlates[sheetSlateIdx ?? 0].md }
    : null;
  return (
    <DCArtboard label={`${label}${sublabel ? ' · ' + sublabel : ''}`} width={390} height={844} style={{ borderRadius: 48, boxShadow: '0 30px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.08)' }}>
      <DeviceShell dark={theme === 'dark'}>
        <div style={{ position: 'relative', height: '100%', width: '100%' }}>
          <HomeView26
            theme={theme} mode={mode || 'normal'} offline={offline}
            activeSlate={showSheet ? (sheetSlateIdx ?? 0) : null}
            selectedDate={selectedDate || WW_TODAY}
            showFollowUp={showFollowUp !== false}
          />
          {slateForSheet && <SlateDetail26Sheet slate={slateForSheet} c={c} />}
        </div>
      </DeviceShell>
    </DCArtboard>
  );
}

function CalendarFrame({ label, sublabel, theme, selectedDate }) {
  return (
    <DCArtboard label={`${label}${sublabel ? ' · ' + sublabel : ''}`} width={390} height={844} style={{ borderRadius: 48, boxShadow: '0 30px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.08)' }}>
      <DeviceShell dark={theme === 'dark'}>
        <div style={{ position: 'relative', height: '100%', width: '100%' }}>
          <CalendarView26 theme={theme} selectedDate={selectedDate || WW_TODAY} />
        </div>
      </DeviceShell>
    </DCArtboard>
  );
}

const SwatchRow = ({ label, swatches }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
    <div style={{ width: 70, fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(40,30,20,0.55)', fontFamily: 'ui-monospace, monospace' }}>{label}</div>
    {swatches.map((s, i) => (
      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <div style={{ width: 18, height: 18, borderRadius: 4, background: s.c, boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.1)' }} />
        <div style={{ fontSize: 10, fontFamily: 'ui-monospace, monospace', color: 'rgba(40,30,20,0.75)' }}>{s.n}</div>
      </div>
    ))}
  </div>
);

function ThemeHeader({ label, title, desc, tint, swatches }) {
  return (
    <div style={{ padding: '0 60px 20px', maxWidth: 1100 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', color: tint, textTransform: 'uppercase', marginBottom: 8, fontFamily: 'ui-monospace, "SF Mono", monospace' }}>
        {label}
      </div>
      <div style={{ fontSize: 26, fontWeight: 700, color: 'rgba(25,20,15,0.92)', letterSpacing: -0.5, marginBottom: 10, lineHeight: 1.15 }}>
        {title}
      </div>
      <div style={{ fontSize: 13.5, lineHeight: 1.7, color: 'rgba(50,40,30,0.72)', maxWidth: 820, marginBottom: 14 }}>
        {desc}
      </div>
      {swatches && swatches.map((row, i) => <SwatchRow key={i} label={row.label} swatches={row.swatches} />)}
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      {/* Title */}
      <div style={{ padding: '0 60px 40px', maxWidth: 1100 }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', color: 'rgba(60,50,40,0.55)', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'ui-monospace, "SF Mono", monospace' }}>
          Workwiki Mobile · 3 테마 · Liquid Glass · 2026-04-19
        </div>
        <div style={{ fontSize: 36, fontWeight: 700, color: 'rgba(25,20,15,0.92)', letterSpacing: -0.8, marginBottom: 12, lineHeight: 1.1 }}>
          Light · Dark · Ant Design
        </div>
        <div style={{ fontSize: 15, lineHeight: 1.65, color: 'rgba(50,40,30,0.7)', maxWidth: 820 }}>
          iOS 26 <b>Liquid Glass 크롬</b>(탭바·주간 스트립·검색바·상세 시트 전부 backdrop-blur 28–40px)은 세 테마 모두 동일.
          색감만 세 가지 — 기존 <b>Light</b>(중립 크림), 기존 <b>Dark</b>(Tokyo Night), 신규 <b>Ant</b>(Ant Design 5 팔레트).
          사용자 선택 또는 시스템 설정에 따라 런타임에 전환 가능합니다.
        </div>
      </div>

      {/* ── Theme 1: Light ────────────────────────────────────────── */}
      <ThemeHeader
        label="테마 1 · Light (기존)"
        title="뉴트럴 크림 + 블루 악센트"
        desc="기존 Workwiki 데스크탑과 동일한 색 언어. 크림 페이퍼 배경(#F4F3EF)에 Workwiki 시그니처 블루(#3D5AFE). 유리 크롬만 추가."
        tint="#3D5AFE"
        swatches={[
          { label: 'Base', swatches: [{c:'#F4F3EF', n:'bg'},{c:'#FFFFFF', n:'surface'},{c:'#1A1B26', n:'text'}] },
          { label: 'Accent', swatches: [{c:'#3D5AFE', n:'primary'},{c:'#C2456F', n:'meet'},{c:'#B07A1F', n:'memo'},{c:'#7A4FB5', n:'personal'}] },
        ]}
      />
      <DCSection title="Light · 홈 + 달력 + 시트" subtitle="뉴트럴 크림 페이퍼에 Liquid Glass 크롬">
        <HomeFrame label="L-01 · 홈 · 오늘" sublabel="10 slates · Follow-up 배너" theme="light" mode="normal" />
        <CalendarFrame label="L-02 · 달력 · 오늘" sublabel="월간 · 유리 탭바" theme="light" selectedDate={WW_TODAY} />
        <HomeFrame label="L-03 · 상세 시트 · Slate" sublabel="원본 노트 · 유리 시트" theme="light" mode="normal" showSheet={true} sheetSlateIdx={1} forceTab="slate" />
      </DCSection>

      {/* ── Theme 2: Dark ─────────────────────────────────────────── */}
      <ThemeHeader
        label="테마 2 · Dark (기존)"
        title="Tokyo Night + 소프트 블루"
        desc="기존 다크 테마. 딥 인디고(#1A1B26) 베이스에 Tokyo Night 시그니처 블루(#7AA2F7). 카테고리 색은 Tokyo Night 팔레트 그대로."
        tint="#7AA2F7"
        swatches={[
          { label: 'Base', swatches: [{c:'#1A1B26', n:'bg'},{c:'#24283B', n:'surface'},{c:'#C0CAF5', n:'text'}] },
          { label: 'Accent', swatches: [{c:'#7AA2F7', n:'primary'},{c:'#F7768E', n:'meet'},{c:'#E0AF68', n:'memo'},{c:'#BB9AF7', n:'personal'}] },
        ]}
      />
      <DCSection title="Dark · 홈 + 달력 + 시트" subtitle="Tokyo Night에 Liquid Glass 크롬">
        <HomeFrame label="D-01 · 홈 · 오늘" sublabel="10 slates · Follow-up 배너" theme="dark" mode="normal" />
        <CalendarFrame label="D-02 · 달력 · Follow-up 날짜" sublabel="04-22 선택" theme="dark" selectedDate="2026-04-22" />
        <HomeFrame label="D-03 · 상세 시트 · MD" sublabel="유리 시트 · 행동 바" theme="dark" mode="normal" showSheet={true} sheetSlateIdx={0} />
      </DCSection>

      {/* ── Theme 3: Ant Design ──────────────────────────────────── */}
      <ThemeHeader
        label="테마 3 · Ant Design (신규)"
        title="Daybreak Blue + Ant 5 카테고리"
        desc="Ant Design 5 디자인 토큰. Daybreak Blue-6 (#1677FF) 프라이머리 + 5색 카테고리(red-6/blue-6/gold-6/purple-6/green-6). 배경 #F5F5F5, border #D9D9D9, 한 단계 더 차분한 엔터프라이즈 톤."
        tint="#1677FF"
        swatches={[
          { label: 'Base', swatches: [{c:'#F5F5F5', n:'layoutBg'},{c:'#FFFFFF', n:'surface'},{c:'#D9D9D9', n:'border'}] },
          { label: 'Primary', swatches: [{c:'#1677FF', n:'blue-6'},{c:'#E6F4FF', n:'blue-1'},{c:'#BAE0FF', n:'blue-2'}] },
          { label: 'Category', swatches: [{c:'#F5222D', n:'red-6'},{c:'#1677FF', n:'blue-6'},{c:'#FAAD14', n:'gold-6'},{c:'#722ED1', n:'purple-6'},{c:'#52C41A', n:'green-6'}] },
        ]}
      />
      <DCSection title="Ant · 홈 + 달력 + 시트" subtitle="Ant Design 팔레트 + Liquid Glass 크롬">
        <HomeFrame label="A-01 · 홈 · 오늘" sublabel="#1677FF · Follow-up 배너" theme="ant" mode="normal" />
        <CalendarFrame label="A-02 · 달력 · 오늘" sublabel="Ant blue-1 선택, red-6 follow-up" theme="ant" selectedDate={WW_TODAY} />
        <HomeFrame label="A-03 · 상세 시트 · MD" sublabel="유리 시트 · 행동 바" theme="ant" mode="normal" showSheet={true} sheetSlateIdx={0} />
        <HomeFrame label="A-04 · 상세 시트 · Slate" sublabel="원본 노트 · 탭 그룹" theme="ant" mode="normal" showSheet={true} sheetSlateIdx={1} forceTab="slate" />
      </DCSection>

      <DCSection title="Ant · 상태 변이" subtitle="빈 날 · 다른 날짜 · 오프라인">
        <HomeFrame label="A-05 · 빈 날 (04-21)" sublabel="이 날 슬레이트 없음" theme="ant" mode="normal" selectedDate="2026-04-21" />
        <HomeFrame label="A-06 · 목요일 (04-16)" sublabel="Follow-up + 5 slates" theme="ant" mode="normal" selectedDate="2026-04-16" />
        <HomeFrame label="A-07 · 오프라인" sublabel="#1677FF 캐시 배너" theme="ant" mode="normal" offline={true} />
      </DCSection>

      {/* Comparison notes */}
      <div style={{ padding: '0 60px 56px', maxWidth: 1100, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 30 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: '#3D5AFE', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'ui-monospace, monospace' }}>LIGHT 특징</div>
          <ul style={{ fontSize: 12.5, lineHeight: 1.7, color: 'rgba(40,30,20,0.78)', paddingLeft: 18, margin: 0 }}>
            <li>기존 Workwiki 시각 언어 그대로</li>
            <li>크림 페이퍼 → 장시간 열람 친화</li>
            <li>블루 악센트는 시그니처 유지</li>
            <li>데스크탑과 일관성 최고</li>
          </ul>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: '#7AA2F7', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'ui-monospace, monospace' }}>DARK 특징</div>
          <ul style={{ fontSize: 12.5, lineHeight: 1.7, color: 'rgba(40,30,20,0.78)', paddingLeft: 18, margin: 0 }}>
            <li>Tokyo Night — 코드 도구 친숙</li>
            <li>딥 인디고 + 소프트 블루</li>
            <li>야간·어두운 환경 최적</li>
            <li>기존 사용자 경험 보존</li>
          </ul>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: '#1677FF', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'ui-monospace, monospace' }}>ANT 특징</div>
          <ul style={{ fontSize: 12.5, lineHeight: 1.7, color: 'rgba(40,30,20,0.78)', paddingLeft: 18, margin: 0 }}>
            <li>Ant Design 5 공식 토큰</li>
            <li>Daybreak Blue — 엔터프라이즈 표준</li>
            <li>5색 카테고리로 구분 선명</li>
            <li>border·split line 명확 (정보 많을 때)</li>
          </ul>
        </div>
      </div>

      <div style={{ padding: '0 60px 32px', maxWidth: 1100 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: 'rgba(60,50,40,0.55)', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'ui-monospace, monospace' }}>공통 (Liquid Glass 크롬)</div>
        <ul style={{ fontSize: 13, lineHeight: 1.75, color: 'rgba(40,30,20,0.78)', paddingLeft: 18, margin: 0, maxWidth: 820 }}>
          <li>탭바·주간 스트립·검색바·상세 시트: backdrop-blur 28–40px + saturate 170–180% + 1px 상단 하이라이트</li>
          <li>3단계 그림자: 카드(soft) / 시트(medium) / 모달(strong)</li>
          <li>라운드: 카드 16–18px, 시트 24px, FAB 28px</li>
          <li>인디케이터 규칙: 하단 중앙 점(슬레이트) + 우상단 점(Follow-up) — 색만 테마별</li>
        </ul>
      </div>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
